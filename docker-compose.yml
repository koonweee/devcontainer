services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DEVBOX_DB_PATH: /data/devbox.sqlite
      DEVBOX_RUNTIME_IMAGE: devbox-runtime:local
      DEVBOX_TAILSCALE_SIDECAR_IMAGE: devbox-tailscale-sidecar:local
      DEVBOX_RUNTIME_ENV_FILE: /runtime/runtime.env
      DEVBOX_WEB_ORIGIN: http://localhost:4173,http://localhost:5173
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - devbox-data:/data
      - ./docker/runtime/runtime.env:/runtime/runtime.env:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DEVBOX_INTERNAL_API_URL: http://api:3000
      DEVBOX_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api
    ports:
      - "4173:4173"
    restart: unless-stopped

volumes:
  devbox-data:
