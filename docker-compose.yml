services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DEVBOX_DB_PATH: /data/devbox.sqlite
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - devbox-data:/data
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DEVBOX_INTERNAL_API_URL: http://api:3000
      DEVBOX_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api
    ports:
      - "4173:4173"
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: devbox
      POSTGRES_PASSWORD: devbox
      POSTGRES_DB: devbox
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  devbox-data:
  postgres-data:
